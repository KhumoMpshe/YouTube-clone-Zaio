<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        (function () {
            try {
                const saved = localStorage.getItem('theme');
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = saved || (prefersDark ? 'dark' : 'light');
                document.documentElement.dataset.theme = theme;
            } catch {
                // ignore
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/favicon.svg">
    <title>Login • YouTube</title>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <a class="logo-link" href="index.html" aria-label="Go to home">
                <img class="logo-dark" src="assets/logo.svg" alt="YouTube logo">
                <img class="logo-light" src="assets/logo-light.svg" alt="YouTube logo">
            </a>
        </div>

        <div class="navigation-icons">
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
                <i id="theme-toggle-icon" class="material-icons" aria-hidden="true">dark_mode</i>
            </button>
        </div>
    </div>

    <main class="auth-page">
        <div class="auth-card">
            <h1>Sign in</h1>
            <p class="auth-subtitle">Use any email/password (demo login).</p>

            <form id="login-form" class="auth-form">
                <label>
                    <span>Email</span>
                    <input id="email" type="email" autocomplete="email" required placeholder="you@example.com">
                </label>

                <label>
                    <span>Password</span>
                    <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••">
                </label>

                <p id="login-error" class="auth-error" role="alert" aria-live="polite"></p>

                <button class="auth-submit" type="submit">Login</button>
                <a class="auth-back" href="index.html">Back to home</a>
            </form>
        </div>
    </main>

    <script>
        (function () {
            const btn = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-toggle-icon');
            if (!btn || !icon) return;

            function applyTheme(theme) {
                document.documentElement.dataset.theme = theme;
                const isDark = theme === 'dark';
                btn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
                icon.textContent = isDark ? 'light_mode' : 'dark_mode';
                try { localStorage.setItem('theme', theme); } catch {}
            }

            function getCurrentTheme() {
                const t = document.documentElement.dataset.theme;
                return t === 'dark' || t === 'light' ? t : 'dark';
            }

            applyTheme(getCurrentTheme());
            btn.addEventListener('click', function () {
                applyTheme(getCurrentTheme() === 'dark' ? 'light' : 'dark');
            });
        })();
    </script>

    <script>
        (function () {
            if (localStorage.getItem('auth_logged_in') === 'true') {
                window.location.href = 'index.html';
                return;
            }

            const form = document.getElementById('login-form');
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const error = document.getElementById('login-error');

            if (!form || !email || !password || !error) return;

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                error.textContent = '';

                const emailValue = String(email.value || '').trim();
                const passwordValue = String(password.value || '').trim();

                if (!emailValue || !passwordValue) {
                    error.textContent = 'Please enter an email and password.';
                    return;
                }

                localStorage.setItem('auth_logged_in', 'true');
                localStorage.setItem('auth_user', emailValue);
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>
